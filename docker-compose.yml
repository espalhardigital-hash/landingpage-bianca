version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lead_magnet_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lead_magnet_db
    ports:
      - "5480:5432" # Mapeado al puerto 5480 en el host para evitar conflictos
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: lead_magnet_minio
    restart: always
    ports:
      - "9080:9000" # Mapeado al puerto 9080 en el host para evitar conflictos
      - "9081:9001" # Mapeado al puerto 9081 en el host para evitar conflictos
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: lead_magnet_minio_init
    depends_on:
      - minio
    volumes:
      - ./backend/static/guia-ansiedad.pdf:/tmp/guia-ansiedad.pdf
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      until (/usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin) do echo 'Waiting for MinIO...' && sleep 1; done;
      /usr/bin/mc mb myminio/lead-magnets || true;
      /usr/bin/mc anonymous set download myminio/lead-magnets || true;
      /usr/bin/mc cp /tmp/guia-ansiedad.pdf myminio/lead-magnets/guia-ansiedad.pdf;
      echo 'MinIO initialized successfully!';
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lead_magnet_backend
    restart: always
    ports:
      - "8080:8000" # Mapeado al puerto 8080 en el host para evitar conflictos
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/lead_magnet_db
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_SECURE=False
      - MINIO_EXTERNAL_ENDPOINT=localhost:9080 # Puerto externo de MinIO
      - FRONTEND_URL=http://localhost:3080
      - BACKEND_URL=http://localhost:8080
      - RESEND_API_KEY=${RESEND_API_KEY:-}
    depends_on:
      - db
      - minio
    volumes:
      - ./backend:/app
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.mente-en-calma-backend.rule=Host(`api.menteencalma.local`)"
    #   - "traefik.http.routers.mente-en-calma-backend.entrypoints=websecure"
    #   - "traefik.http.routers.mente-en-calma-backend.tls.certresolver=myresolver"
    #   - "traefik.http.services.mente-en-calma-backend.loadbalancer.server.port=8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lead_magnet_frontend
    restart: always
    ports:
      - "3080:3000" # Mapeado al puerto 3080 en el host para evitar conflictos
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.mente-en-calma-frontend.rule=Host(`menteencalma.local`)"
    #   - "traefik.http.routers.mente-en-calma-frontend.entrypoints=websecure"
    #   - "traefik.http.routers.mente-en-calma-frontend.tls.certresolver=myresolver"
    #   - "traefik.http.services.mente-en-calma-frontend.loadbalancer.server.port=3000"

volumes:
  postgres_data:
  minio_data:
